# File Organizer Configuration

# Extension to directory mapping for organize mode
extension_to_dir:
  # Videos
  .mp4: videos
  .mkv: videos
  .avi: videos
  .mov: videos
  .wmv: videos
  .flv: videos
  .webm: videos
  .mpg: videos
  .mpeg: videos
  .3gp: videos
  .m4v: videos

  # Audio
  .mp3: audio
  .wav: audio
  .flac: audio
  .aac: audio
  .ogg: audio
  .wma: audio
  .m4a: audio
  .opus: audio

  # Images
  .jpg: images
  .jpeg: images
  .png: images
  .gif: images
  .bmp: images
  .tiff: images
  .webp: images
  .svg: images
  .heif: images
  .heic: images
  .ico: images
  .cur: images

  # Documents - Text
  .txt: documents/text
  .rtf: documents/text
  .md: documents/text
  .log: documents/text

  # Documents - PDF
  .pdf: documents/pdf

  # Documents - Word
  .doc: documents/word
  .docx: documents/word
  .odt: documents/word

  # Documents - Excel
  .xls: documents/excel
  .xlsx: documents/excel
  .ods: documents/excel

  # Documents - PowerPoint
  .ppt: documents/powerpoint
  .pptx: documents/powerpoint
  .odp: documents/powerpoint

  # Documents - Data
  .csv: documents/data
  .json: documents/data
  .xml: documents/data

  # Archives
  .zip: archives
  .tar: archives
  .gz: archives
  .bz2: archives
  .xz: archives
  .rar: archives
  .7z: archives
  .tgz: archives
  .tbz2: archives
  .txz: archives

  # Code - Python
  .py: code/python
  .pyw: code/python
  .pyi: code/python

  # Code - JavaScript/TypeScript
  .js: code/javascript
  .jsx: code/javascript
  .ts: code/typescript
  .tsx: code/typescript

  # Code - Web
  .html: code/web
  .htm: code/web
  .css: code/web
  .scss: code/web
  .sass: code/web
  .less: code/web

  # Code - Java/Kotlin
  .java: code/java
  .kt: code/kotlin
  .kts: code/kotlin

  # Code - C/C++
  .c: code/c_cpp
  .cpp: code/c_cpp
  .cc: code/c_cpp
  .cxx: code/c_cpp
  .h: code/c_cpp
  .hpp: code/c_cpp
  .hxx: code/c_cpp

  # Code - Other languages
  .cs: code/csharp
  .go: code/go
  .rb: code/ruby
  .php: code/php
  .swift: code/swift
  .rs: code/rust
  .pl: code/perl
  .r: code/r
  .lua: code/lua
  .scala: code/scala

  # Code - Scripts
  .sh: code/scripts
  .bash: code/scripts
  .zsh: code/scripts
  .fish: code/scripts
  .ps1: code/scripts
  .bat: code/scripts
  .cmd: code/scripts

  # Code - Config
  .yml: code/config
  .yaml: code/config
  .ini: code/config
  .cfg: code/config
  .conf: code/config
  .toml: code/config
  .gitignore: code/config
  .editorconfig: code/config
  .gitattributes: code/config
  .npmignore: code/config
  .babelrc: code/config
  .eslintrc: code/config
  .prettierrc: code/config
  .stylelintrc: code/config

  # Databases
  .sqlite: databases
  .sqlite3: databases
  .sql: databases
  .db: databases

  # Disk Images
  .iso: disk_images
  .img: disk_images
  .vhd: disk_images
  .vmdk: disk_images
  .qcow2: disk_images

  # Fonts
  .ttf: fonts
  .otf: fonts
  .woff: fonts
  .woff2: fonts
  .eot: fonts

# Default directory for unknown extensions
unknown_dir: stuff

# Directory for directories at max depth
directories_dir: directories

# Patterns for unwanted files/directories (regex)
unwanted_patterns:
  # Python
  - "^__pycache__$"
  - "^\\.venv$"
  - "^venv$"
  - "^env$"
  - "\\.pyc$"
  - "^\\.mypy_cache$"
  - "^\\.pytest_cache$"
  - "^\\.ruff_cache$"
  - "^\\.tox$"
  - "^\\.(eggs?|egg-info)$"

  # Node.js
  - "^node_modules$"

  # Build artifacts
  - "^target$"
  - "^build$"
  - "^dist$"
  - "^\\.cache$"

  # IDE/Editor
  - "\\.swp$"
  - "\\.swo$"
  - "~$"
  - "^\\.vscode-server$"

  # OS files
  - "^Thumbs\\.db$"
  - "^\\.DS_Store$"
  - "^ehthumbs\\.db$"
  - "^desktop\\.ini$"
  - "^\\.Trash-\\d+$"
  - "^\\.Trash$"

  # Wine
  - "^\\.wine$"
  - "^\\.wine64$"
